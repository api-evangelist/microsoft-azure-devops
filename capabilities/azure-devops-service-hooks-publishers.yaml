naftiko: 1.0.0-alpha2
info:
  label: Azure DevOps Service Hooks API — Publishers
  description: 'Azure DevOps Service Hooks API — Publishers. 2 operations. Lead operation: Azure DevOps List publishers. Self-contained
    Naftiko capability covering one Microsoft Azure Devops business surface.'
  tags:
  - Microsoft Azure Devops
  - Publishers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_DEVOPS_API_KEY: MICROSOFT_AZURE_DEVOPS_API_KEY
capability:
  consumes:
  - type: http
    namespace: azure-devops-service-hooks-publishers
    baseUri: https://dev.azure.com/{organization}/_apis
    description: Azure DevOps Service Hooks API — Publishers business capability. Self-contained, no shared references.
    resources:
    - name: hooks-publishers
      path: /hooks/publishers
      operations:
      - name: publisherslist
        method: GET
        description: Azure DevOps List publishers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: hooks-publishers-publisherId-eventTypes
      path: /hooks/publishers/{publisherId}/eventTypes
      operations:
      - name: publisherslisteventtypes
        method: GET
        description: Azure DevOps List event types for a publisher
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: publisherId
          in: path
          type: string
          description: Publisher identifier (e.g., 'tfs')
          required: true
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_AZURE_DEVOPS_API_KEY}}'
  exposes:
  - type: rest
    namespace: azure-devops-service-hooks-publishers-rest
    port: 8080
    description: REST adapter for Azure DevOps Service Hooks API — Publishers. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/hooks/publishers
      name: hooks-publishers
      description: REST surface for hooks-publishers.
      operations:
      - method: GET
        name: publisherslist
        description: Azure DevOps List publishers
        call: azure-devops-service-hooks-publishers.publisherslist
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/hooks/publishers/{publisherid}/eventtypes
      name: hooks-publishers-publisherid-eventtypes
      description: REST surface for hooks-publishers-publisherId-eventTypes.
      operations:
      - method: GET
        name: publisherslisteventtypes
        description: Azure DevOps List event types for a publisher
        call: azure-devops-service-hooks-publishers.publisherslisteventtypes
        with:
          publisherId: rest.publisherId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: azure-devops-service-hooks-publishers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Azure DevOps Service Hooks API — Publishers. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: azure-devops-list-publishers
      description: Azure DevOps List publishers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-devops-service-hooks-publishers.publisherslist
      outputParameters:
      - type: object
        mapping: $.
    - name: azure-devops-list-event-types
      description: Azure DevOps List event types for a publisher
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-devops-service-hooks-publishers.publisherslisteventtypes
      with:
        publisherId: tools.publisherId
      outputParameters:
      - type: object
        mapping: $.
