naftiko: 1.0.0-alpha2
info:
  label: Azure DevOps Artifacts API — Feeds
  description: 'Azure DevOps Artifacts API — Feeds. 5 operations. Lead operation: Azure DevOps List feeds. Self-contained
    Naftiko capability covering one Microsoft Azure Devops business surface.'
  tags:
  - Microsoft Azure Devops
  - Feeds
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_DEVOPS_API_KEY: MICROSOFT_AZURE_DEVOPS_API_KEY
capability:
  consumes:
  - type: http
    namespace: azure-devops-artifacts-feeds
    baseUri: https://feeds.dev.azure.com/{organization}/{project}/_apis
    description: Azure DevOps Artifacts API — Feeds business capability. Self-contained, no shared references.
    resources:
    - name: packaging-feeds
      path: /packaging/feeds
      operations:
      - name: feedslist
        method: GET
        description: Azure DevOps List feeds
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: feedRole
          in: query
          type: string
          description: Filter feeds by the current user's role
        - name: includeDeletedUpstreams
          in: query
          type: boolean
          description: Whether to include feeds with deleted upstream sources
        - name: includeUrls
          in: query
          type: boolean
          description: Whether to include package manager endpoint URLs
      - name: feedscreate
        method: POST
        description: Azure DevOps Create a feed
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: packaging-feeds-feedId
      path: /packaging/feeds/{feedId}
      operations:
      - name: feedsget
        method: GET
        description: Azure DevOps Get a feed
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: includeDeletedUpstreams
          in: query
          type: boolean
          description: Whether to include deleted upstream sources in the response
      - name: feedsupdate
        method: PATCH
        description: Azure DevOps Update a feed
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: feedsdelete
        method: DELETE
        description: Azure DevOps Delete a feed
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_AZURE_DEVOPS_API_KEY}}'
  exposes:
  - type: rest
    namespace: azure-devops-artifacts-feeds-rest
    port: 8080
    description: REST adapter for Azure DevOps Artifacts API — Feeds. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/packaging/feeds
      name: packaging-feeds
      description: REST surface for packaging-feeds.
      operations:
      - method: GET
        name: feedslist
        description: Azure DevOps List feeds
        call: azure-devops-artifacts-feeds.feedslist
        with:
          feedRole: rest.feedRole
          includeDeletedUpstreams: rest.includeDeletedUpstreams
          includeUrls: rest.includeUrls
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: feedscreate
        description: Azure DevOps Create a feed
        call: azure-devops-artifacts-feeds.feedscreate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/packaging/feeds/{feedid}
      name: packaging-feeds-feedid
      description: REST surface for packaging-feeds-feedId.
      operations:
      - method: GET
        name: feedsget
        description: Azure DevOps Get a feed
        call: azure-devops-artifacts-feeds.feedsget
        with:
          includeDeletedUpstreams: rest.includeDeletedUpstreams
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: feedsupdate
        description: Azure DevOps Update a feed
        call: azure-devops-artifacts-feeds.feedsupdate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: feedsdelete
        description: Azure DevOps Delete a feed
        call: azure-devops-artifacts-feeds.feedsdelete
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: azure-devops-artifacts-feeds-mcp
    port: 9090
    transport: http
    description: MCP adapter for Azure DevOps Artifacts API — Feeds. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: azure-devops-list-feeds
      description: Azure DevOps List feeds
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-devops-artifacts-feeds.feedslist
      with:
        feedRole: tools.feedRole
        includeDeletedUpstreams: tools.includeDeletedUpstreams
        includeUrls: tools.includeUrls
      outputParameters:
      - type: object
        mapping: $.
    - name: azure-devops-create-feed
      description: Azure DevOps Create a feed
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: azure-devops-artifacts-feeds.feedscreate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: azure-devops-get-feed
      description: Azure DevOps Get a feed
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-devops-artifacts-feeds.feedsget
      with:
        includeDeletedUpstreams: tools.includeDeletedUpstreams
      outputParameters:
      - type: object
        mapping: $.
    - name: azure-devops-update-feed
      description: Azure DevOps Update a feed
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: azure-devops-artifacts-feeds.feedsupdate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: azure-devops-delete-feed
      description: Azure DevOps Delete a feed
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: azure-devops-artifacts-feeds.feedsdelete
      outputParameters:
      - type: object
        mapping: $.
