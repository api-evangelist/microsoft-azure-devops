naftiko: 1.0.0-alpha2
info:
  label: Azure DevOps Work Items API — Work Item Tracking
  description: 'Azure DevOps Work Items API — Work Item Tracking. 1 operations. Lead operation: Azure DevOps Execute a WIQL
    query. Self-contained Naftiko capability covering one Microsoft Azure Devops business surface.'
  tags:
  - Microsoft Azure Devops
  - Work Item Tracking
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_DEVOPS_API_KEY: MICROSOFT_AZURE_DEVOPS_API_KEY
capability:
  consumes:
  - type: http
    namespace: azure-devops-work-items-work-item-tracking
    baseUri: https://dev.azure.com/{organization}/{project}/_apis
    description: Azure DevOps Work Items API — Work Item Tracking business capability. Self-contained, no shared references.
    resources:
    - name: wit-wiql
      path: /wit/wiql
      operations:
      - name: workitemsquerybywiql
        method: POST
        description: Azure DevOps Execute a WIQL query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: $top
          in: query
          type: integer
          description: Maximum number of results to return
        - name: timePrecision
          in: query
          type: boolean
          description: Whether or not to use time precision
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_AZURE_DEVOPS_API_KEY}}'
  exposes:
  - type: rest
    namespace: azure-devops-work-items-work-item-tracking-rest
    port: 8080
    description: REST adapter for Azure DevOps Work Items API — Work Item Tracking. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/wit/wiql
      name: wit-wiql
      description: REST surface for wit-wiql.
      operations:
      - method: POST
        name: workitemsquerybywiql
        description: Azure DevOps Execute a WIQL query
        call: azure-devops-work-items-work-item-tracking.workitemsquerybywiql
        with:
          $top: rest.$top
          timePrecision: rest.timePrecision
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: azure-devops-work-items-work-item-tracking-mcp
    port: 9090
    transport: http
    description: MCP adapter for Azure DevOps Work Items API — Work Item Tracking. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: azure-devops-execute-wiql-query
      description: Azure DevOps Execute a WIQL query
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: azure-devops-work-items-work-item-tracking.workitemsquerybywiql
      with:
        $top: tools.$top
        timePrecision: tools.timePrecision
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
