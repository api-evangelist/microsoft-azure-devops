naftiko: 1.0.0-alpha2
info:
  label: Azure DevOps Builds API — Build Logs
  description: 'Azure DevOps Builds API — Build Logs. 2 operations. Lead operation: Azure DevOps Get build logs. Self-contained
    Naftiko capability covering one Microsoft Azure Devops business surface.'
  tags:
  - Microsoft Azure Devops
  - Build Logs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_DEVOPS_API_KEY: MICROSOFT_AZURE_DEVOPS_API_KEY
capability:
  consumes:
  - type: http
    namespace: azure-devops-builds-build-logs
    baseUri: https://dev.azure.com/{organization}/{project}/_apis
    description: Azure DevOps Builds API — Build Logs business capability. Self-contained, no shared references.
    resources:
    - name: build-builds-buildId-logs
      path: /build/builds/{buildId}/logs
      operations:
      - name: buildsgetlogs
        method: GET
        description: Azure DevOps Get build logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: buildId
          in: path
          type: integer
          description: Numeric ID of the build
          required: true
    - name: build-builds-buildId-timeline
      path: /build/builds/{buildId}/timeline
      operations:
      - name: buildsgettimeline
        method: GET
        description: Azure DevOps Get build timeline
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: buildId
          in: path
          type: integer
          description: Numeric ID of the build
          required: true
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_AZURE_DEVOPS_API_KEY}}'
  exposes:
  - type: rest
    namespace: azure-devops-builds-build-logs-rest
    port: 8080
    description: REST adapter for Azure DevOps Builds API — Build Logs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/build/builds/{buildid}/logs
      name: build-builds-buildid-logs
      description: REST surface for build-builds-buildId-logs.
      operations:
      - method: GET
        name: buildsgetlogs
        description: Azure DevOps Get build logs
        call: azure-devops-builds-build-logs.buildsgetlogs
        with:
          buildId: rest.buildId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/build/builds/{buildid}/timeline
      name: build-builds-buildid-timeline
      description: REST surface for build-builds-buildId-timeline.
      operations:
      - method: GET
        name: buildsgettimeline
        description: Azure DevOps Get build timeline
        call: azure-devops-builds-build-logs.buildsgettimeline
        with:
          buildId: rest.buildId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: azure-devops-builds-build-logs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Azure DevOps Builds API — Build Logs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: azure-devops-get-build-logs
      description: Azure DevOps Get build logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-devops-builds-build-logs.buildsgetlogs
      with:
        buildId: tools.buildId
      outputParameters:
      - type: object
        mapping: $.
    - name: azure-devops-get-build-timeline
      description: Azure DevOps Get build timeline
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-devops-builds-build-logs.buildsgettimeline
      with:
        buildId: tools.buildId
      outputParameters:
      - type: object
        mapping: $.
