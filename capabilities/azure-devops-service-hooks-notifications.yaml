naftiko: 1.0.0-alpha2
info:
  label: Azure DevOps Service Hooks API — Notifications
  description: 'Azure DevOps Service Hooks API — Notifications. 1 operations. Lead operation: Azure DevOps Send a test notification.
    Self-contained Naftiko capability covering one Microsoft Azure Devops business surface.'
  tags:
  - Microsoft Azure Devops
  - Notifications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_DEVOPS_API_KEY: MICROSOFT_AZURE_DEVOPS_API_KEY
capability:
  consumes:
  - type: http
    namespace: azure-devops-service-hooks-notifications
    baseUri: https://dev.azure.com/{organization}/_apis
    description: Azure DevOps Service Hooks API — Notifications business capability. Self-contained, no shared references.
    resources:
    - name: hooks-testnotifications
      path: /hooks/testnotifications
      operations:
      - name: notificationssendtest
        method: POST
        description: Azure DevOps Send a test notification
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: useRealData
          in: query
          type: boolean
          description: Whether to use real event data or synthetic test data
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_AZURE_DEVOPS_API_KEY}}'
  exposes:
  - type: rest
    namespace: azure-devops-service-hooks-notifications-rest
    port: 8080
    description: REST adapter for Azure DevOps Service Hooks API — Notifications. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/hooks/testnotifications
      name: hooks-testnotifications
      description: REST surface for hooks-testnotifications.
      operations:
      - method: POST
        name: notificationssendtest
        description: Azure DevOps Send a test notification
        call: azure-devops-service-hooks-notifications.notificationssendtest
        with:
          useRealData: rest.useRealData
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: azure-devops-service-hooks-notifications-mcp
    port: 9090
    transport: http
    description: MCP adapter for Azure DevOps Service Hooks API — Notifications. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: azure-devops-send-test-notification
      description: Azure DevOps Send a test notification
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: azure-devops-service-hooks-notifications.notificationssendtest
      with:
        useRealData: tools.useRealData
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
