naftiko: 1.0.0-alpha2
info:
  label: Azure DevOps Test Plans API — Test Suites
  description: 'Azure DevOps Test Plans API — Test Suites. 3 operations. Lead operation: Azure DevOps List test suites. Self-contained
    Naftiko capability covering one Microsoft Azure Devops business surface.'
  tags:
  - Microsoft Azure Devops
  - Test Suites
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_DEVOPS_API_KEY: MICROSOFT_AZURE_DEVOPS_API_KEY
capability:
  consumes:
  - type: http
    namespace: azure-devops-test-plans-test-suites
    baseUri: https://dev.azure.com/{organization}/{project}/_apis
    description: Azure DevOps Test Plans API — Test Suites business capability. Self-contained, no shared references.
    resources:
    - name: testplan-plans-planId-suites
      path: /testplan/plans/{planId}/suites
      operations:
      - name: testsuiteslist
        method: GET
        description: Azure DevOps List test suites
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: $expand
          in: query
          type: string
          description: Expand additional suite details
        - name: continuationToken
          in: query
          type: string
          description: Continuation token for paginated results
        - name: asTreeView
          in: query
          type: boolean
          description: Return suites in a tree structure
      - name: testsuitescreate
        method: POST
        description: Azure DevOps Create a test suite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: testplan-plans-planId-suites-suiteId
      path: /testplan/plans/{planId}/suites/{suiteId}
      operations:
      - name: testsuitesget
        method: GET
        description: Azure DevOps Get a test suite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: suiteId
          in: path
          type: integer
          description: Numeric ID of the test suite
          required: true
        - name: $expand
          in: query
          type: string
          description: Expand additional suite details
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_AZURE_DEVOPS_API_KEY}}'
  exposes:
  - type: rest
    namespace: azure-devops-test-plans-test-suites-rest
    port: 8080
    description: REST adapter for Azure DevOps Test Plans API — Test Suites. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/testplan/plans/{planid}/suites
      name: testplan-plans-planid-suites
      description: REST surface for testplan-plans-planId-suites.
      operations:
      - method: GET
        name: testsuiteslist
        description: Azure DevOps List test suites
        call: azure-devops-test-plans-test-suites.testsuiteslist
        with:
          $expand: rest.$expand
          continuationToken: rest.continuationToken
          asTreeView: rest.asTreeView
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: testsuitescreate
        description: Azure DevOps Create a test suite
        call: azure-devops-test-plans-test-suites.testsuitescreate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/testplan/plans/{planid}/suites/{suiteid}
      name: testplan-plans-planid-suites-suiteid
      description: REST surface for testplan-plans-planId-suites-suiteId.
      operations:
      - method: GET
        name: testsuitesget
        description: Azure DevOps Get a test suite
        call: azure-devops-test-plans-test-suites.testsuitesget
        with:
          suiteId: rest.suiteId
          $expand: rest.$expand
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: azure-devops-test-plans-test-suites-mcp
    port: 9090
    transport: http
    description: MCP adapter for Azure DevOps Test Plans API — Test Suites. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: azure-devops-list-test-suites
      description: Azure DevOps List test suites
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-devops-test-plans-test-suites.testsuiteslist
      with:
        $expand: tools.$expand
        continuationToken: tools.continuationToken
        asTreeView: tools.asTreeView
      outputParameters:
      - type: object
        mapping: $.
    - name: azure-devops-create-test-suite
      description: Azure DevOps Create a test suite
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: azure-devops-test-plans-test-suites.testsuitescreate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: azure-devops-get-test-suite
      description: Azure DevOps Get a test suite
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-devops-test-plans-test-suites.testsuitesget
      with:
        suiteId: tools.suiteId
        $expand: tools.$expand
      outputParameters:
      - type: object
        mapping: $.
