naftiko: 1.0.0-alpha2
info:
  label: Azure DevOps Git Repositories API — Repositories
  description: 'Azure DevOps Git Repositories API — Repositories. 6 operations. Lead operation: Azure DevOps List repositories.
    Self-contained Naftiko capability covering one Microsoft Azure Devops business surface.'
  tags:
  - Microsoft Azure Devops
  - Repositories
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_DEVOPS_API_KEY: MICROSOFT_AZURE_DEVOPS_API_KEY
capability:
  consumes:
  - type: http
    namespace: azure-devops-git-repositories
    baseUri: https://dev.azure.com/{organization}/{project}/_apis
    description: Azure DevOps Git Repositories API — Repositories business capability. Self-contained, no shared references.
    resources:
    - name: git-repositories
      path: /git/repositories
      operations:
      - name: repositorieslist
        method: GET
        description: Azure DevOps List repositories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: includeLinks
          in: query
          type: boolean
          description: Whether to include _links in the response
        - name: includeAllUrls
          in: query
          type: boolean
          description: Whether to include all remote URLs (fetch and push)
        - name: includeHidden
          in: query
          type: boolean
          description: Whether to include hidden repositories
      - name: repositoriescreate
        method: POST
        description: Azure DevOps Create a repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sourceRef
          in: query
          type: string
          description: Initial branch name for the repository
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: git-repositories-repositoryId
      path: /git/repositories/{repositoryId}
      operations:
      - name: repositoriesget
        method: GET
        description: Azure DevOps Get a repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: includeParent
          in: query
          type: boolean
          description: Whether to include the parent repository (for forks)
      - name: repositoriesupdate
        method: PATCH
        description: Azure DevOps Update a repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: repositoriesdelete
        method: DELETE
        description: Azure DevOps Delete a repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: git-repositories-repositoryId-items
      path: /git/repositories/{repositoryId}/items
      operations:
      - name: itemslist
        method: GET
        description: Azure DevOps List repository items
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: scopePath
          in: query
          type: string
          description: Path to the folder or file to list
        - name: recursionLevel
          in: query
          type: string
          description: How deep to recurse into subfolders
        - name: includeContentMetadata
          in: query
          type: boolean
          description: Whether to include content metadata (size, encoding) for files
        - name: latestProcessedChange
          in: query
          type: boolean
          description: Whether to include the latest commit that changed each item
        - name: download
          in: query
          type: boolean
          description: Whether to return file content as a download
        - name: versionDescriptor.version
          in: query
          type: string
          description: Branch, tag, or commit to retrieve items at
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_AZURE_DEVOPS_API_KEY}}'
  exposes:
  - type: rest
    namespace: azure-devops-git-repositories-rest
    port: 8080
    description: REST adapter for Azure DevOps Git Repositories API — Repositories. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/git/repositories
      name: git-repositories
      description: REST surface for git-repositories.
      operations:
      - method: GET
        name: repositorieslist
        description: Azure DevOps List repositories
        call: azure-devops-git-repositories.repositorieslist
        with:
          includeLinks: rest.includeLinks
          includeAllUrls: rest.includeAllUrls
          includeHidden: rest.includeHidden
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: repositoriescreate
        description: Azure DevOps Create a repository
        call: azure-devops-git-repositories.repositoriescreate
        with:
          sourceRef: rest.sourceRef
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/git/repositories/{repositoryid}
      name: git-repositories-repositoryid
      description: REST surface for git-repositories-repositoryId.
      operations:
      - method: GET
        name: repositoriesget
        description: Azure DevOps Get a repository
        call: azure-devops-git-repositories.repositoriesget
        with:
          includeParent: rest.includeParent
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: repositoriesupdate
        description: Azure DevOps Update a repository
        call: azure-devops-git-repositories.repositoriesupdate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: repositoriesdelete
        description: Azure DevOps Delete a repository
        call: azure-devops-git-repositories.repositoriesdelete
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/git/repositories/{repositoryid}/items
      name: git-repositories-repositoryid-items
      description: REST surface for git-repositories-repositoryId-items.
      operations:
      - method: GET
        name: itemslist
        description: Azure DevOps List repository items
        call: azure-devops-git-repositories.itemslist
        with:
          scopePath: rest.scopePath
          recursionLevel: rest.recursionLevel
          includeContentMetadata: rest.includeContentMetadata
          latestProcessedChange: rest.latestProcessedChange
          download: rest.download
          versionDescriptor.version: rest.versionDescriptor.version
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: azure-devops-git-repositories-mcp
    port: 9090
    transport: http
    description: MCP adapter for Azure DevOps Git Repositories API — Repositories. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: azure-devops-list-repositories
      description: Azure DevOps List repositories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-devops-git-repositories.repositorieslist
      with:
        includeLinks: tools.includeLinks
        includeAllUrls: tools.includeAllUrls
        includeHidden: tools.includeHidden
      outputParameters:
      - type: object
        mapping: $.
    - name: azure-devops-create-repository
      description: Azure DevOps Create a repository
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: azure-devops-git-repositories.repositoriescreate
      with:
        sourceRef: tools.sourceRef
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: azure-devops-get-repository
      description: Azure DevOps Get a repository
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-devops-git-repositories.repositoriesget
      with:
        includeParent: tools.includeParent
      outputParameters:
      - type: object
        mapping: $.
    - name: azure-devops-update-repository
      description: Azure DevOps Update a repository
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: azure-devops-git-repositories.repositoriesupdate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: azure-devops-delete-repository
      description: Azure DevOps Delete a repository
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: azure-devops-git-repositories.repositoriesdelete
      outputParameters:
      - type: object
        mapping: $.
    - name: azure-devops-list-repository-items
      description: Azure DevOps List repository items
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-devops-git-repositories.itemslist
      with:
        scopePath: tools.scopePath
        recursionLevel: tools.recursionLevel
        includeContentMetadata: tools.includeContentMetadata
        latestProcessedChange: tools.latestProcessedChange
        download: tools.download
        versionDescriptor.version: tools.versionDescriptor.version
      outputParameters:
      - type: object
        mapping: $.
