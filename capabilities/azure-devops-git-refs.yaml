naftiko: 1.0.0-alpha2
info:
  label: Azure DevOps Git Repositories API — Refs
  description: 'Azure DevOps Git Repositories API — Refs. 1 operations. Lead operation: Azure DevOps List branches and refs.
    Self-contained Naftiko capability covering one Microsoft Azure Devops business surface.'
  tags:
  - Microsoft Azure Devops
  - Refs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_DEVOPS_API_KEY: MICROSOFT_AZURE_DEVOPS_API_KEY
capability:
  consumes:
  - type: http
    namespace: azure-devops-git-refs
    baseUri: https://dev.azure.com/{organization}/{project}/_apis
    description: Azure DevOps Git Repositories API — Refs business capability. Self-contained, no shared references.
    resources:
    - name: git-repositories-repositoryId-refs
      path: /git/repositories/{repositoryId}/refs
      operations:
      - name: refslist
        method: GET
        description: Azure DevOps List branches and refs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter
          in: query
          type: string
          description: Prefix filter for ref names (e.g., 'heads/' returns branches)
        - name: includeLinks
          in: query
          type: boolean
          description: Whether to include _links
        - name: includeStatuses
          in: query
          type: boolean
          description: Whether to include commit status information
        - name: includeMyBranches
          in: query
          type: boolean
          description: Whether to prioritize branches created by the current user
        - name: latestStatusesOnly
          in: query
          type: boolean
          description: Return only the latest status for each ref
        - name: $top
          in: query
          type: integer
          description: Maximum number of refs to return
        - name: continuationToken
          in: query
          type: string
          description: Continuation token for paging
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_AZURE_DEVOPS_API_KEY}}'
  exposes:
  - type: rest
    namespace: azure-devops-git-refs-rest
    port: 8080
    description: REST adapter for Azure DevOps Git Repositories API — Refs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/git/repositories/{repositoryid}/refs
      name: git-repositories-repositoryid-refs
      description: REST surface for git-repositories-repositoryId-refs.
      operations:
      - method: GET
        name: refslist
        description: Azure DevOps List branches and refs
        call: azure-devops-git-refs.refslist
        with:
          filter: rest.filter
          includeLinks: rest.includeLinks
          includeStatuses: rest.includeStatuses
          includeMyBranches: rest.includeMyBranches
          latestStatusesOnly: rest.latestStatusesOnly
          $top: rest.$top
          continuationToken: rest.continuationToken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: azure-devops-git-refs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Azure DevOps Git Repositories API — Refs. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: azure-devops-list-branches-and
      description: Azure DevOps List branches and refs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-devops-git-refs.refslist
      with:
        filter: tools.filter
        includeLinks: tools.includeLinks
        includeStatuses: tools.includeStatuses
        includeMyBranches: tools.includeMyBranches
        latestStatusesOnly: tools.latestStatusesOnly
        $top: tools.$top
        continuationToken: tools.continuationToken
      outputParameters:
      - type: object
        mapping: $.
