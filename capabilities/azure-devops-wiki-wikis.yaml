naftiko: 1.0.0-alpha2
info:
  label: Azure DevOps Wiki API — Wikis
  description: 'Azure DevOps Wiki API — Wikis. 5 operations. Lead operation: Azure DevOps List wikis. Self-contained Naftiko
    capability covering one Microsoft Azure Devops business surface.'
  tags:
  - Microsoft Azure Devops
  - Wikis
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_DEVOPS_API_KEY: MICROSOFT_AZURE_DEVOPS_API_KEY
capability:
