    namespace: azure-devops-wiki-wikis
    baseUri: https://dev.azure.com/{organization}/{project}/_apis
    description: Azure DevOps Wiki API — Wikis business capability. Self-contained, no shared references.
    resources:
    - name: wiki-wikis
      path: /wiki/wikis
      operations:
      - name: wikislist
        method: GET
        description: Azure DevOps List wikis
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: wikiscreate
        method: POST
        description: Azure DevOps Create a wiki
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: wiki-wikis-wikiIdentifier
      path: /wiki/wikis/{wikiIdentifier}
      operations:
      - name: wikisget
        method: GET
        description: Azure DevOps Get a wiki
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: versionDescriptor
          in: query
          type: string
          description: Version descriptor for the wiki (branch or tag)
      - name: wikisupdate
        method: PATCH
        description: Azure DevOps Update a wiki
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: wikisdelete
        method: DELETE
        description: Azure DevOps Delete a wiki
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_AZURE_DEVOPS_API_KEY}}'
  exposes:
  - type: rest
    namespace: azure-devops-wiki-wikis-rest
    port: 8080
    description: REST adapter for Azure DevOps Wiki API — Wikis. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/wiki/wikis
      name: wiki-wikis
      description: REST surface for wiki-wikis.
      operations:
      - method: GET
        name: wikislist
        description: Azure DevOps List wikis
        call: azure-devops-wiki-wikis.wikislist
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: wikiscreate
        description: Azure DevOps Create a wiki
        call: azure-devops-wiki-wikis.wikiscreate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/wiki/wikis/{wikiidentifier}
      name: wiki-wikis-wikiidentifier
      description: REST surface for wiki-wikis-wikiIdentifier.
      operations:
      - method: GET
        name: wikisget
        description: Azure DevOps Get a wiki
        call: azure-devops-wiki-wikis.wikisget
        with:
          versionDescriptor: rest.versionDescriptor
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: wikisupdate
        description: Azure DevOps Update a wiki
        call: azure-devops-wiki-wikis.wikisupdate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: wikisdelete
        description: Azure DevOps Delete a wiki
        call: azure-devops-wiki-wikis.wikisdelete
        outputParameters:
        - type: object
          mapping: $.
