        idempotent: false
      call: azure-devops-wiki-wikis.wikiscreate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: azure-devops-get-wiki
      description: Azure DevOps Get a wiki
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-devops-wiki-wikis.wikisget
      with:
        versionDescriptor: tools.versionDescriptor
      outputParameters:
      - type: object
        mapping: $.
    - name: azure-devops-update-wiki
      description: Azure DevOps Update a wiki
      hints:
