  - type: http
    namespace: azure-devops-service-hooks-consumers
    baseUri: https://dev.azure.com/{organization}/_apis
    description: Azure DevOps Service Hooks API — Consumers business capability. Self-contained, no shared references.
    resources:
    - name: hooks-consumers
      path: /hooks/consumers
      operations:
      - name: consumerslist
        method: GET
        description: Azure DevOps List consumers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_AZURE_DEVOPS_API_KEY}}'
  exposes:
  - type: rest
    namespace: azure-devops-service-hooks-consumers-rest
    port: 8080
    description: REST adapter for Azure DevOps Service Hooks API — Consumers. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/hooks/consumers
      name: hooks-consumers
      description: REST surface for hooks-consumers.
      operations:
      - method: GET
        name: consumerslist
        description: Azure DevOps List consumers
        call: azure-devops-service-hooks-consumers.consumerslist
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: azure-devops-service-hooks-consumers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Azure DevOps Service Hooks API — Consumers. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: azure-devops-list-consumers
      description: Azure DevOps List consumers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-devops-service-hooks-consumers.consumerslist
      outputParameters:
      - type: object
        mapping: $.
