naftiko: 1.0.0-alpha2
info:
  label: Azure DevOps Service Hooks API — Consumers
  description: 'Azure DevOps Service Hooks API — Consumers. 1 operations. Lead operation: Azure DevOps List consumers. Self-contained
    Naftiko capability covering one Microsoft Azure Devops business surface.'
  tags:
  - Microsoft Azure Devops
  - Consumers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_DEVOPS_API_KEY: MICROSOFT_AZURE_DEVOPS_API_KEY
capability:
