naftiko: 1.0.0-alpha2
info:
  label: Azure DevOps Test Plans API — Test Plans
  description: 'Azure DevOps Test Plans API — Test Plans. 5 operations. Lead operation: Azure DevOps List test plans. Self-contained
    Naftiko capability covering one Microsoft Azure Devops business surface.'
  tags:
  - Microsoft Azure Devops
  - Test Plans
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_DEVOPS_API_KEY: MICROSOFT_AZURE_DEVOPS_API_KEY
capability:
  consumes:
  - type: http
    namespace: azure-devops-test-plans-test-plans
    baseUri: https://dev.azure.com/{organization}/{project}/_apis
    description: Azure DevOps Test Plans API — Test Plans business capability. Self-contained, no shared references.
    resources:
    - name: testplan-plans
      path: /testplan/plans
      operations:
      - name: testplanslist
        method: GET
        description: Azure DevOps List test plans
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: owner
          in: query
          type: string
          description: Filter test plans by owner (user display name or email)
        - name: includePlanDetails
          in: query
          type: boolean
          description: Whether to return full plan details or just IDs and names
        - name: filterActivePlans
          in: query
          type: boolean
          description: Return only active (non-completed) test plans
        - name: continuationToken
          in: query
          type: string
          description: Continuation token for paginated results
        - name: isLastUpdatedSet
          in: query
          type: boolean
          description: Whether to return plans sorted by last update
      - name: testplanscreate
        method: POST
        description: Azure DevOps Create a test plan
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: testplan-plans-planId
      path: /testplan/plans/{planId}
      operations:
      - name: testplansget
        method: GET
        description: Azure DevOps Get a test plan
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: testplansupdate
        method: PATCH
        description: Azure DevOps Update a test plan
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: testplansdelete
        method: DELETE
        description: Azure DevOps Delete a test plan
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_AZURE_DEVOPS_API_KEY}}'
  exposes:
  - type: rest
    namespace: azure-devops-test-plans-test-plans-rest
    port: 8080
    description: REST adapter for Azure DevOps Test Plans API — Test Plans. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/testplan/plans
      name: testplan-plans
      description: REST surface for testplan-plans.
      operations:
      - method: GET
        name: testplanslist
        description: Azure DevOps List test plans
        call: azure-devops-test-plans-test-plans.testplanslist
        with:
          owner: rest.owner
          includePlanDetails: rest.includePlanDetails
          filterActivePlans: rest.filterActivePlans
          continuationToken: rest.continuationToken
          isLastUpdatedSet: rest.isLastUpdatedSet
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: testplanscreate
        description: Azure DevOps Create a test plan
        call: azure-devops-test-plans-test-plans.testplanscreate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/testplan/plans/{planid}
      name: testplan-plans-planid
      description: REST surface for testplan-plans-planId.
      operations:
      - method: GET
        name: testplansget
        description: Azure DevOps Get a test plan
        call: azure-devops-test-plans-test-plans.testplansget
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: testplansupdate
        description: Azure DevOps Update a test plan
        call: azure-devops-test-plans-test-plans.testplansupdate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: testplansdelete
        description: Azure DevOps Delete a test plan
        call: azure-devops-test-plans-test-plans.testplansdelete
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: azure-devops-test-plans-test-plans-mcp
    port: 9090
    transport: http
    description: MCP adapter for Azure DevOps Test Plans API — Test Plans. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: azure-devops-list-test-plans
      description: Azure DevOps List test plans
      hints:
        readOnly: true
        destructive: false
        idempotent: true
