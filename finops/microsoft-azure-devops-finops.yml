specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Azure DevOps
providerId: microsoft-azure-devops
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - DevOps
  - Microsoft Azure
description: 'FOCUS-aligned FinOps for Azure DevOps Services: per-user license subscriptions (Basic,
  Basic + Test Plans, Stakeholder free) plus pay-per-slot Microsoft-hosted and self-hosted Pipelines
  parallel jobs and tiered Artifacts storage.'
sources:
  - https://azure.microsoft.com/en-us/pricing/details/devops/azure-devops-services/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Microsoft Corporation
serviceCategory: DevOps / Developer Tools
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Azure DevOps Services
  ServiceCategory: DevOps
  ProviderName: Microsoft
  PublisherName: Microsoft Corporation
  InvoiceIssuerName: Microsoft Corporation
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: basic_user_seats
    unit: seat-month
    aggregation: sum
    dimensions:
      - organization
      - team
  - name: basic_test_plans_seats
    unit: seat-month
    aggregation: sum
    dimensions:
      - organization
      - team
  - name: ms_hosted_parallel_jobs
    unit: parallel_job-month
    aggregation: sum
    dimensions:
      - organization
      - project
  - name: self_hosted_parallel_jobs
    unit: parallel_job-month
    aggregation: sum
    dimensions:
      - organization
  - name: artifacts_storage
    unit: GB-month
    aggregation: avg
    dimensions:
      - organization
      - feed
principles:
  - name: Visibility
    description: Use the Azure DevOps organization Billing settings page and Azure Cost Management
      filtered to Azure DevOps for license, pipelines, and artifacts breakdown by organization.
  - name: Allocation
    description: Allocate cost by organization, project, and team using project ownership metadata;
      tag billing subscriptions per business unit.
  - name: Optimization
    description: Reclaim Basic licenses from inactive users on a quarterly cadence; downgrade non-contributors
      to Stakeholder; right-size parallel job slots vs queue time; move high-volume builds to self-hosted
      agents for cost savings.
  - name: Accountability
    description: Assign org admins as cost owners; set per-org spend alerts in Azure Cost Management;
      review at quarterly Microsoft EA true-up.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
